# ===
# Radius, shadow, blur
# ===

# --
# Radius
# --
size-radius-xs:
  $type: dimension
  $value: "2px"
  $description: "Subtle corner rounding for inputs, tables, and data-dense UI where curves should be barely visible."
size-radius-sm:
  $type: dimension
  $value: "4px"
  $description: "Small components: tags, compact buttons, and nested controls inside cards."
size-radius-md:
  $type: dimension
  $value: "6px"
  $description: "Default interactive control radius balancing softness with a technical look."
size-radius-lg:
  $type: dimension
  $value: "8px"
  $description: "Cards, tiles, and medium panels that should read as distinct surfaces."
size-radius-xl:
  $type: dimension
  $value: "12px"
  $description: "Large modals, marketing cards, and prominent floating elements."
size-radius-2xl:
  $type: dimension
  $value: "16px"
  $description: "Maximum standard radius for pill-adjacent containers before fully circular caps."

# --
# Shadow — surface
# --
shadow-surface-base:
  $type: shadow
  $value:
    color: "silver"
    offsetX:
      value: 0
      unit: px
    offsetY:
      value: 1
      unit: px
    blur:
      value: 2
      unit: px
    spread:
      value: 0
      unit: px
  $description: "Lowest elevation: barely lifts the base surface from the canvas (toolbars, sticky headers)."
shadow-surface-card:
  $type: shadow
  $value:
    color: "darkgray"
    offsetX:
      value: 0
      unit: px
    offsetY:
      value: 2
      unit: px
    blur:
      value: 4
      unit: px
    spread:
      value: 0
      unit: px
  $description: "Standard card depth for default modules sitting on the page background."
shadow-surface-overlay:
  $type: shadow
  $value:
    color: "dimgray"
    offsetX:
      value: 0
      unit: px
    offsetY:
      value: 8
      unit: px
    blur:
      value: 16
      unit: px
    spread:
      value: 0
      unit: px
  $description: "Deep shadow for dialogs, popovers, and menus that must clearly float above other layers."
shadow-surface-raised:
  $type: shadow
  $value:
    color: "gray"
    offsetX:
      value: 0
      unit: px
    offsetY:
      value: 4
      unit: px
    blur:
      value: 8
      unit: px
    spread:
      value: 0
      unit: px
  $description: "Mid elevation for toasts, dropdown panels, and secondary floating surfaces between card and overlay."

# --
# Blur
# --
blur-surface-scrim:
  $type: dimension
  $value: "8px"
  $description: "Backdrop blur applied with the scrim to soften content behind modals while keeping focus on the overlay."
