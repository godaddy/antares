name: Manage Prerelease Mode

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - enter
          - exit
      tag:
        description: 'Prerelease tag (only for enter action)'
        required: false
        default: 'next'
        type: string

jobs:
  manage-prerelease:
    name: Enter/Exit Prerelease Mode
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      TURBO_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout Repo
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version-file: .nvmrc
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install Dependencies
        run: npm ci

      - name: Enter Prerelease Mode
        if: inputs.action == 'enter'
        run: |
          npx changeset pre enter ${{ inputs.tag }}
          echo "Entered prerelease mode with tag: ${{ inputs.tag }}"

      - name: Exit Prerelease Mode
        if: inputs.action == 'exit'
        run: |
          npx changeset pre exit
          echo "Exited prerelease mode"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5e914681df9dc83aa4e4905692ca88beb2f9e91f # v7.0.5
        with:
          commit-message: "chore: ${{ inputs.action }} prerelease mode${{ inputs.action == 'enter' && format(' ({0})', inputs.tag) || '' }}"
          branch: changeset-prerelease-${{ inputs.action }}
          delete-branch: true
          title: "${{ inputs.action == 'enter' && format('Enter prerelease mode ({0})', inputs.tag) || 'Exit prerelease mode' }}"
          body: |
            This PR ${{ inputs.action == 'enter' && format('enters prerelease mode with the `{0}` tag', inputs.tag) || 'exits prerelease mode and returns to stable releases' }}.
            
            ## What happens after merging?
            
            ${{ inputs.action == 'enter' && format('- All future version bumps will use the `{0}` prerelease tag\n- Packages will be published with `npm install @bento/<package>@{0}`\n- Versions will look like `0.2.0-{0}.0`, `0.2.0-{0}.1`, etc.', inputs.tag) || '- All future version bumps will be stable releases\n- Packages will be published as `latest` on npm\n- The next version will remove prerelease suffixes' }}
            
            ---
            
            Generated by the [Manage Prerelease Mode workflow](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          labels: |
            changesets
            release

