name: Continuous Integration

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  ***REMOVED***Run CI when changesets bot pushes to release branches
  ***REMOVED***This satisfies required status checks since GITHUB_TOKEN doesn't trigger pull_request events
  push:
    branches:
      - "changeset-release/**"

***REMOVED***Avoid redundant runs for same PRs
concurrency:
  group: ci-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      TURBO_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout Repo
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 ***REMOVED***v5.0.0

      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 ***REMOVED***v5.0.0
        with:
          node-version-file: .nvmrc
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Restore Turbo Cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            turbo-${{ runner.os }}-

      - name: Install Dependencies
        run: npm ci

      - name: Restore Playwright Cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        run: npx playwright install

      - name: Build Packages
        run: npm run build

      - name: Test
        run: npm test -- --concurrency=1

      - name: Lint
        run: npm run lint
