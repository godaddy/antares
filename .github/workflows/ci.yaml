name: Continuous Integration

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  # Run CI when changesets bot pushes to release branches
  # This satisfies required status checks since GITHUB_TOKEN doesn't trigger pull_request events
  push:
    branches:
      - 'changeset-release/**'

# Avoid redundant runs for same PRs
concurrency:
  group: ci-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      TURBO_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Check resources
        run: |
          df -h
          free -h
          nproc

      - name: Test manual extraction
        run: |
          curl -o /tmp/chrome.zip https://cdn.playwright.dev/builds/cft/145.0.7632.6/linux64/chrome-linux64.zip
          echo "Download done, extracting..."
          time unzip -q /tmp/chrome.zip -d /tmp/chrome-test
          echo "Extract done"
          rm -rf /tmp/chrome.zip /tmp/chrome-test

      - name: Install Playwright browsers
        timeout-minutes: 5
        run: npx playwright install chromium

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Run Type Check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Run Visual Tests
        run: npm run test:visual

      - name: Lint
        run: npm run lint

      - name: Upload Visual Test Artifacts
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: visual-test-diffs-${{ github.event.pull_request.number || github.run_id }}
          path: packages/@godaddy/antares/.vitest-attachments/
          include-hidden-files: true
          retention-days: 2
          if-no-files-found: ignore
