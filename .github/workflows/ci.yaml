name: Continuous Integration

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  # Run CI when changesets bot pushes to release branches
  # This satisfies required status checks since GITHUB_TOKEN doesn't trigger pull_request events
  push:
    branches:
      - 'changeset-release/**'

# Avoid redundant runs for same PRs
concurrency:
  group: ci-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      TURBO_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout Repo
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Node
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version-file: .nvmrc
          # cache: npm
          cache-dependency-path: package-lock.json

      # - name: Restore NX Cache
      #   uses: actions/cache@v4
      #   with:
      #     path: .nx/cache
      #     key: nx-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
      #     restore-keys: |
      #       nx-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
      #       nx-${{ runner.os }}-

      - name: Install Dependencies
        run: npm ci

      # - name: Restore Playwright Cache
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.cache/ms-playwright
      #     key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
      #     restore-keys: |
      #       playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Build Packages
        run: npm run build

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint
