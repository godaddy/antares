name: Docs Site Main Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'apps/site/**'
      - 'packages/@godaddy/antares/components/**/README.mdx'
      - 'package*.json'

permissions:
  id-token: write
  contents: write

concurrency:
  group: gh-pages-docs-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Build Docs Site
        run: npx nx build site
        env:
          GITHUB_PAGES: 'true'
          NEXT_PUBLIC_BASE_PATH: '/antares'

      - name: Prepare for GitHub Pages
        working-directory: apps/site/out
        run: |
          touch .nojekyll
          if [ -d 404 ]; then cp 404/index.html 404.html; fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          folder: ./apps/site/out
          clean: false
