name: Changeset Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "packages/**"
      - "!packages/**/*.test.*"
      - "!packages/**/*.spec.*"
      - "!packages/**/*.stories.*"

jobs:
  check:
    name: Check for changeset
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && !startsWith(github.head_ref, 'changeset-release/')
    env:
      TURBO_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout repository with full git history
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 ***REMOVED***v5.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js from .nvmrc
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 ***REMOVED***v5.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Verify changeset exists for package changes
        run: bash .github/scripts/check-changeset.sh "${{ github.base_ref }}"

      - name: Validate changeset format and package versions
        run: npx changeset status --since origin/${{ github.base_ref }}

      - name: Comment on PR with changeset instructions
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const script = await import('${{ github.workspace }}/.github/scripts/comment-on-pr.js');
            await script.default({ github, context });
