name: Storybook PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install Dependencies
        run: npm ci

      - name: Build Storybook
        run: npx nx build:storybook docs
        env:
          STORYBOOK_BASE_PATH: '/${{ github.event.repository.name }}/pr-${{ github.event.pull_request.number }}-storybook/'

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          folder: ./apps/docs/storybook-static
          target-folder: pr-${{ github.event.pull_request.number }}-storybook
          clean: false

      - name: Post Preview URL Comment
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const repo = context.repo;
            const pagesResponse = await github.rest.repos.getPages({ owner: repo.owner, repo: repo.repo });
            const pagesBaseUrl = pagesResponse.data.html_url.replace(/\/$/, '');
            const previewUrl = `${pagesBaseUrl}/pr-${prNumber}-storybook/`;

            const commentBody = `## 📚 Storybook Preview\n\nPreview URL: ${previewUrl}\n\nPreview will be automatically deleted when this PR is closed.`;

            const comments = await github.rest.issues.listComments({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Storybook Preview')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: repo.owner,
                repo: repo.repo,
                comment_id: botComment.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: prNumber,
                body: commentBody,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages Branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages

      - name: Remove PR Directory
        run: |
          PR_DIR="pr-${{ github.event.pull_request.number }}-storybook"
          if [ -d "$PR_DIR" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -rf "$PR_DIR"
            git commit -m "Remove storybook preview for PR #${{ github.event.pull_request.number }}"
            # Retry push with rebase to handle concurrent gh-pages updates
            for i in 1 2 3; do
              git pull --rebase origin gh-pages && git push origin gh-pages && break
              echo "Push failed (attempt $i), retrying..."
              sleep 2
            done
          else
            echo "Preview directory $PR_DIR does not exist, nothing to clean up"
          fi
